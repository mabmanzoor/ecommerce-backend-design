<!DOCTYPE html>
<html>

<head>
  <title>Login</title>

  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <div class="container">

    <h1>Login Page</h1>

    <form method="POST" action="/login">

      <input 
        type="email" 
        name="email"
        placeholder="Email"
      >

      <br><br>

      <input 
        type="password" 
        name="password"
        placeholder="Password"
      >

      <br><br>

      <button type="submit">
        Login
      </button>

    </form>

  </div>

</body>

</html>
